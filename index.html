<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Books - Read</title>
  <link rel="icon" href="icon_books.jpg" type="image/x-icon">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Caveat', cursive;
      background: linear-gradient(135deg, #f5f7fa 0%, #ddeeff 100%);
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
    }

    #quote {
      position: relative;
      top: 0;
      margin: 20px auto 0 auto;
      transform: none;
      font-size: 24px;
      color: #333;
      width: 90%;
      max-width: 900px;
      opacity: 1;
      text-align: center;
      background: rgba(255, 255, 255, 0.92);
      padding: 20px 40px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      z-index: 100;
      backdrop-filter: blur(2px);
    }

    .main-text {
      text-align: center;
      display: block;
      width: 100%;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .quote-attribution {
      text-align: right;
      font-weight: bold;
      font-size: 20px;
      opacity: 0.8;
      display: block;
      width: 100%;
    }

    #book-container {
      position: relative;
      width: 100%;
      padding: 30px 20px 60px 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px 35px;
      box-sizing: border-box;
      margin-top: 25px;
    }

    .book-item {
      position: relative;
      width: 220px;
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    .book-item:hover {
      transform: translateY(-6px);
    }

    /* 标签容器 - 在图片上方 */
    .book-label-container {
      margin-bottom: 12px;
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .book-label {
      background: linear-gradient(135deg, #ff8c00, #ff6b00);
      color: white;
      font-family: 'Arial', sans-serif;
      font-weight: bold;
      font-size: 20px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      box-shadow: 0 6px 18px rgba(255, 107, 0, 0.35), 0 2px 8px rgba(0, 0, 0, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: all 0.2s ease;
    }

    .book-label:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 22px rgba(255, 107, 0, 0.5);
    }

    .book-label-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .book-emoji {
      font-size: 18px;
      line-height: 1;
    }

    .book-number {
      font-size: 22px;
      line-height: 1;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    /* 关键修改：图片完整显示，不使用裁剪 - object-fit: contain 保持完整比例，不裁剪任何内容 */
    .book-image {
      width: 100%;
      height: auto;           /* 高度自适应，保持原始比例 */
      aspect-ratio: 7 / 10;   /* 设置一个优雅的书籍比例（宽高比2:3），可根据需要调整，保证容器一致性但不裁剪内容 */
      object-fit: contain;    /* 关键：contain 保证完整显示图片，不裁剪任何部分 */
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: all 0.2s ease;
      background-color: #faf3e0;
      display: block;
    }

    .book-image:hover {
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      transform: scale(1.01);
    }

    /* 可选：为了统一视觉效果，给图片容器添加一个优雅的背景，让留白区域更协调 */
    .book-image-wrapper {
      width: 100%;
      background: linear-gradient(145deg, #f5ede3, #e8dfd3);
      border-radius: 12px;
      padding: 4px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
    }

    /* 书名样式保持 */
    .book-title {
      font-size: 18px;
      margin-top: 10px;
      font-weight: 500;
      color: #3e3a39;
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: 'Caveat', cursive;
      letter-spacing: 0.5px;
    }

    /* 响应式调整 */
    @media (max-width: 900px) {
      #quote {
        font-size: 20px;
        padding: 16px 30px;
        margin-top: 16px;
      }
      .quote-attribution {
        font-size: 18px;
      }
      .book-item {
        width: 200px;
      }
      .book-label {
        width: 52px;
        height: 52px;
        font-size: 18px;
      }
      .book-number {
        font-size: 20px;
      }
      .book-emoji {
        font-size: 16px;
      }
      .book-title {
        font-size: 16px;
      }
    }

    @media (max-width: 640px) {
      #book-container {
        gap: 32px 20px;
        padding: 20px 16px 50px 16px;
      }
      .book-item {
        width: 170px;
      }
      .book-label {
        width: 48px;
        height: 48px;
        font-size: 16px;
      }
      .book-number {
        font-size: 18px;
      }
      .book-emoji {
        font-size: 14px;
      }
      .book-title {
        font-size: 14px;
        margin-top: 8px;
      }
    }

    @media (max-width: 480px) {
      .book-item {
        width: 44%;
        max-width: 170px;
      }
      .book-label {
        width: 44px;
        height: 44px;
      }
      .book-number {
        font-size: 17px;
      }
      #quote {
        font-size: 18px;
        padding: 12px 20px;
      }
      .quote-attribution {
        font-size: 15px;
      }
      .book-title {
        font-size: 13px;
      }
    }
    
    /* 优雅加载提示 */
    .loading-placeholder {
      text-align: center;
      padding: 40px;
      font-size: 22px;
      color: #7f8c8d;
      width: 100%;
    }
    
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body>
  <div id="quote">
    <div class="main-text">
      If we must build a bridge, let us throw one arch at least over the darker gulf of ignorance which surrounds us.
    </div>
    <div class="quote-attribution">
      &mdash; Thoreau, <em>Walden</em>
    </div>
  </div>

  <div id="book-container"></div>

  <script>
    // 加载书籍数据
    const container = document.getElementById('book-container');
    
    // 优雅显示加载中状态
    const showLoading = () => {
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'loading-placeholder';
      loadingDiv.id = 'temp-loading';
      loadingDiv.textContent = '📚 正在为你准备书架 ...';
      container.appendChild(loadingDiv);
    };
    
    const removeLoading = () => {
      const temp = document.getElementById('temp-loading');
      if(temp) temp.remove();
    };
    
    showLoading();
    
    // 获取书籍数据
    fetch('booklist.json')
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
      })
      .then(books => {
        removeLoading();
        if (!books || books.length === 0) {
          container.innerHTML = '<div style="text-align: center; font-size: 24px; color: #666; padding: 50px;">✨ 暂无书籍数据，请稍后添加 ✨</div>';
          return;
        }
        
        // 使用 DocumentFragment 批量添加，提升性能
        const fragment = document.createDocumentFragment();
        
        books.forEach((book, index) => {
          // 创建书籍元素
          const bookItem = document.createElement('div');
          bookItem.className = 'book-item';
          
          // 标签容器
          const labelContainer = document.createElement('div');
          labelContainer.className = 'book-label-container';
          
          // 圆形标签
          const label = document.createElement('div');
          label.className = 'book-label';
          label.innerHTML = `
            <div class="book-label-content">
              <span class="book-emoji">🟠</span>
              <span class="book-number">${index + 1}</span>
            </div>
          `;
          
          // 图片元素 - 使用 contain 保证完整显示，不裁剪任何内容
          const img = document.createElement('img');
          img.className = 'book-image';
          // 使用拼音文件名或后备名称
          let imageName = (book.pinyin && book.pinyin.trim() !== '') ? book.pinyin : `book_${index + 1}`;
          // 处理可能包含空格或特殊字符
          const encodedName = encodeURIComponent(imageName);
          img.src = `assets/photos/${encodedName}.jpg`;
          img.alt = book.title ? `${book.title} 封面` : `书籍 ${index + 1}`;
          img.loading = 'lazy';
          img.decoding = 'async';
          
          // 优雅的错误处理 - 使用完整显示的占位图
          img.onerror = function() {
            this.onerror = null;
            // 使用 SVG 占位图，同样完整显示，不裁剪
            this.src = 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 300 450\'%3E%3Crect width=\'100%25\' height=\'100%25\' fill=\'%23f3ede5\'/%3E%3Ctext x=\'50%25\' y=\'45%25\' font-family=\'monospace\' font-size=\'18\' text-anchor=\'middle\' fill=\'%23bfa88a\'%3E📖%3C/text%3E%3Ctext x=\'50%25\' y=\'55%25\' font-family=\'monospace\' font-size=\'14\' text-anchor=\'middle\' fill=\'%239c7e5c\'%3ENo Image%3C/text%3E%3C/svg%3E';
            this.style.backgroundColor = '#f7f2ea';
            // 确保占位图也完整显示
            this.style.objectFit = 'contain';
          };
          
          labelContainer.appendChild(label);
          bookItem.appendChild(labelContainer);
          bookItem.appendChild(img);
          
          // 添加书名（如果存在）
          if (book.title && book.title.length > 0) {
            const titleSpan = document.createElement('div');
            titleSpan.className = 'book-title';
            // 处理标题过长，完整显示在tooltip中
            let displayTitle = book.title;
            if (displayTitle.length > 24) displayTitle = displayTitle.slice(0, 22) + '…';
            titleSpan.textContent = displayTitle;
            titleSpan.title = book.title;  // 鼠标悬停显示完整书名
            bookItem.appendChild(titleSpan);
          }
          
          fragment.appendChild(bookItem);
        });
        
        container.appendChild(fragment);
        
        // 可选：为所有图片添加一个加载完成后的轻微优化，确保布局稳定
        const allImages = document.querySelectorAll('.book-image');
        let loadedCount = 0;
        const totalImages = allImages.length;
        
        // 简单的图片加载完成处理，用于优化体验（非必须）
        if (totalImages > 0) {
          const checkAllLoaded = () => {
            loadedCount++;
            if (loadedCount === totalImages) {
              // 所有图片加载完成，可以添加一个类用于额外效果（可选）
              document.body.classList.add('images-loaded');
            }
          };
          allImages.forEach(img => {
            if (img.complete) {
              loadedCount++;
            } else {
              img.addEventListener('load', checkAllLoaded);
              img.addEventListener('error', checkAllLoaded);
            }
          });
        }
        
        console.log('✨ 书籍加载完成，图片使用完整显示模式（不裁剪），滚动流畅');
      })
      .catch(error => {
        console.error('加载书籍数据时出错:', error);
        removeLoading();
        container.innerHTML = '<div style="text-align: center; font-size: 22px; color: #a0522d; background: #fff8f0; margin: 40px auto; padding: 40px; border-radius: 28px; max-width: 80%;">📭 无法加载书籍清单，请检查网络或 booklist.json 文件是否存在。<br><span style="font-size: 16px;">' + error.message + '</span></div>';
      });
    
    // 完全移除了之前导致滚轮卡顿的 wheel 事件监听
    // 移除了绝对定位的 quote 动态调整逻辑，页面布局自然流畅
    // 图片使用 object-fit: contain，保证每本书的封面完整显示，上下左右都不会被裁剪
  </script>
</body>
</html>
